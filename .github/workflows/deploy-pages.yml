name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'dist/variables.css'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Generar sitio estatico
        run: npm run build

      - name: Guardar tokens generados en el repo
        run: |
          git config user.name "Macaque Bot"
          git config user.email "bot@macaque.com"
          git add dist/variables.css
          git diff --cached --quiet && exit 0
          git commit -m "style: actualizar variables css desde figma"
          git push

      - name: Crear tag de release
        id: release_tag
        run: |
          CURRENT_SHA="$(git rev-parse --short HEAD)"
          TAG_NAME="release-$(date -u +'%Y%m%d-%H%M%S')-${CURRENT_SHA}"
          git tag -a "$TAG_NAME" -m "Release automatica $TAG_NAME"
          git push origin "$TAG_NAME"
          printf 'tag_name=%s\n' "$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-dist

      - name: Resumen de release
        run: |
          printf '## Release publicada\n\n' >> "$GITHUB_STEP_SUMMARY"
          printf -- '- Tag: `%s`\n' "${{ steps.release_tag.outputs.tag_name }}" >> "$GITHUB_STEP_SUMMARY"
          printf -- '- Commit: `%s`\n' "$(git rev-parse --short HEAD)" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
